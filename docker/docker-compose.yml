version: "3.9"

# SkyMeshX docker-compose
# Simulates the full heterogeneous swarm stack locally (SITL)
#
# Start: docker compose up
# Stop:  docker compose down

services:
  # Ground station / coordinator (x86)
  gcs:
    build:
      context: ..
      dockerfile: docker/Dockerfile.x86
    image: skymeshx:x86
    container_name: skymeshx-gcs
    ports:
      - "8080:8080"
    environment:
      - DRONE_PORT=tcp:host.docker.internal:5760
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - swarm

  # Generic UAV agent (Pi-style — minimal resources)
  uav_generic:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pi
    image: skymeshx:pi
    container_name: skymeshx-uav1
    environment:
      - DRONE_PORT=tcp:host.docker.internal:5761
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - swarm

  # Observation UAV agent (Jetson-style — full stack)
  uav_observation:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jetson
    image: skymeshx:jetson
    container_name: skymeshx-uav2
    environment:
      - DRONE_PORT=tcp:host.docker.internal:5762
    ports:
      - "8082:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - swarm
    # Uncomment for real Jetson with GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

networks:
  swarm:
    driver: bridge
