name: Build uavresearch gcs

on:
  push:
    branches:
      - main
      - ui-dashboard
      - "fix/**"
      - "feature/**"
    tags: ["v*"]
  pull_request:
    branches:
      - main
      - ui-dashboard
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux Qt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/installer/requirements_build.txt
          python -m pip install . requests

      - name: Generate installer assets
        run: python tools/installer/icon/make_assets.py

      - name: Build uavresearch gcs bundle
        run: pyinstaller tools/installer/specs/uavresearch_gcs.spec --noconfirm --clean

      - name: Package bundle on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/UAVResearchGCS -DestinationPath uavresearch-gcs-windows.zip -Force

      - name: Package bundle on macOS/Linux
        if: runner.os != 'Windows'
        run: |
          tar -czf "uavresearch-gcs-${{ runner.os }}.tar.gz" -C dist UAVResearchGCS

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: uavresearch-gcs-windows
          path: uavresearch-gcs-windows.zip

      - name: Upload macOS/Linux artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: uavresearch-gcs-${{ runner.os }}
          path: uavresearch-gcs-${{ runner.os }}.tar.gz
