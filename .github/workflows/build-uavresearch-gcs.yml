name: Build & Publish UAVResearch GCS

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
#   • Every push to main/feature/fix branches  → build only (CI check)
#   • Push of a v* tag                          → build + publish release
#   • Pull-requests to main / ui-dashboard      → build only
#   • Manual trigger (workflow_dispatch)
#       publish input = true  → build + publish as a nightly/manual release
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - ui-dashboard
      - "fix/**"
      - "feature/**"
    tags: ["v*"]
  pull_request:
    branches:
      - main
      - ui-dashboard
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a release to joeldjio/rz-gcs-releases?"
        type: boolean
        default: false

# ─────────────────────────────────────────────────────────────────────────────
# Build matrix (Windows installer, macOS bundle, Linux .deb)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
          - name: linux-jammy
            os: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Qt system libs required on headless Linux runners
      - name: Install Linux Qt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xfixes0

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/installer/requirements_build.txt
          python -m pip install . requests

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      # ── Windows & macOS ───────────────────────────────────────────────────

      - name: Generate branding assets
        if: runner.os != 'Linux'
        run: python tools/installer/icon/make_assets.py

      - name: Build GCS PyInstaller bundle
        if: runner.os != 'Linux'
        # Use "python -m PyInstaller" so the command works even when the
        # pyinstaller shim is not on PATH (common on Windows runners).
        run: python -m PyInstaller tools/installer/specs/uavresearch_gcs.spec --noconfirm --clean

      - name: Compile Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' /Q tools\installer\inno\uavresearch_gcs.iss

      - name: Package macOS bundle as tar.gz
        if: runner.os == 'macOS'
        run: tar -czf "uavresearch-gcs-macos.tar.gz" -C dist UAVResearchGCS

      # ── Linux ─────────────────────────────────────────────────────────────

      - name: Build Linux .deb package
        if: runner.os == 'Linux'
        run: |
          chmod +x tools/installer/build_linux_deb.sh
          tools/installer/build_linux_deb.sh

      # ── Upload artifacts (available to the publish job) ───────────────────

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: uavresearch-gcs-windows
          path: tools/installer/out/uavresearch-gcs-setup-*.exe

      - name: Upload macOS bundle
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: uavresearch-gcs-macos
          path: uavresearch-gcs-macos.tar.gz

      - name: Upload Linux .deb
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: uavresearch-gcs-linux-jammy
          path: tools/installer/out/*.deb

  # ─────────────────────────────────────────────────────────────────────────
  # Publish job – runs ONLY on version tags or manual dispatch with publish=true
  # Pushes a GitHub Release (with all installer assets) to the PUBLIC repo
  # joeldjio/rz-gcs-releases so users can download without touching the
  # private source repo.
  #
  # Required secret (set in Settings → Secrets → Actions of THIS repo):
  #   RELEASES_REPO_TOKEN  – a GitHub Personal Access Token (classic) with
  #                          the "public_repo" scope, owned by joeldjio.
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish release → joeldjio/rz-gcs-releases
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets # each artifact in its own sub-folder

      - name: Flatten into a single folder
        run: |
          mkdir -p flat
          find release-assets -type f | xargs -I{} cp {} flat/
          echo "── Release files ──────────────────"
          ls -lh flat/

      # Determine the release tag:
      #   • version tag push  → use the tag as-is  (e.g. v0.3.1)
      #   • manual dispatch   → nightly-YYYYMMDD
      - name: Determine release tag
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="nightly-$(date +'%Y%m%d-%H%M')"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Create / update release in rz-gcs-releases
        uses: softprops/action-gh-release@v2
        with:
          repository: joeldjio/rz-gcs-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: "UAVResearch GCS ${{ steps.version.outputs.tag }}"
          body: |
            ## UAVResearch GCS ${{ steps.version.outputs.tag }}

            Built automatically from the private source repository.

            ### Downloads

            | Platform | File |
            |----------|------|
            | **Windows** | `uavresearch-gcs-setup-*.exe` – run the installer |
            | **macOS** | `uavresearch-gcs-macos.tar.gz` – extract and run the app |
            | **Linux** (Ubuntu 22.04 Jammy) | `*.deb` – `sudo dpkg -i *.deb` |

            > **Note:** Windows Defender / macOS Gatekeeper may warn about an
            > unsigned binary. Click *More info → Run anyway* (Windows) or
            > right-click → Open (macOS) to proceed.
          files: flat/*
          draft: false
          prerelease: ${{ !startsWith(steps.version.outputs.tag, 'v') }}
